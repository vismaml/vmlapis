syntax = "proto3";

package ssn.companylookup.v1;

import "google/protobuf/timestamp.proto";
import "ssn/type/candidate.proto";

option go_package = "github.com/e-conomic/vmlapis/gen/go/ssn/companylookup/v1;companylookup";

// CompanyLookupService is an internal service called during invoice
// post-processing. It records observations, verifies bank accounts against
// accumulated history, and returns already-known company enrichment. It never
// calls external registries — enrichment is fetched out of band by a job.
service CompanyLookupService {
  rpc ProcessInvoiceCompanyData(ProcessInvoiceCompanyDataRequest) returns (ProcessInvoiceCompanyDataResponse);
}

enum TrustVerdict {
  TRUST_VERDICT_UNSPECIFIED = 0;
  NEW = 1;
  KNOWN = 2;
}

enum EnrichmentStatus {
  ENRICHMENT_STATUS_UNSPECIFIED = 0;
  PENDING = 1;
  ENRICHED = 2;
  FAILED = 3;
}

message Company {
  string vat_number = 1;
  string organisation_number = 2;
  string country_code = 3; // ISO 3166-1 alpha-2
  string name = 4;
  string raw_address = 5;
  ssn.type.Confidence confidence = 6;
}

message BankAccount {
  string iban = 1;
  string bic = 2;
  string bank_account_number = 3;
  string bank_registration_number = 4;
  ssn.type.Confidence confidence = 5;
}

message ProcessInvoiceCompanyDataRequest {
  string project_name = 1;
  string transaction_id = 2;
  Company supplier = 3;
  Company receiver = 4;
  repeated BankAccount bank_accounts = 5;
  repeated string product_types = 6;
}

message BankAccountVerdict {
  string account_key = 1;
  TrustVerdict verdict = 2;
  int64 observed_count_tenant = 3;
  int64 observed_count_global = 4;
  google.protobuf.Timestamp first_seen = 5;
  google.protobuf.Timestamp last_seen = 6;
}

message EnrichedCompany {
  string company_key = 1;
  string registry_name = 2;
  string registry_address = 3;
  bool vat_valid = 4;
  string industry = 5;
  EnrichmentStatus enrichment_status = 6;
}

message ProcessInvoiceCompanyDataResponse {
  EnrichedCompany supplier = 1;
  repeated BankAccountVerdict bank_account_verdicts = 2;
}
