syntax = "proto3";

package asgt.v2;

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "protoc-gen-openapiv2/options/annotations.proto";
import "validate/validate.proto";

option go_package = "github.com/e-conomic/vmlapis/gen/go/asgt/v2";
option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "Product Types"
    version: "v2"
    description: ""
  }
  schemes: HTTPS
  consumes: "application/json"
  produces: "application/json"
};

service ProductTypeService {
  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_tag) = {description: "Suggest product types from text descriptions."};

  // Suggest product types for a batch of text inputs.
  rpc BatchSuggest(ProductTypeBatchSuggestRequest) returns (ProductTypeBatchSuggestResponse) {
    option (google.api.http) = {
      post: "/v2/models/product-types:batchSuggest"
      body: "*"
    };
  }

  // Internal cluster-only batch suggest for product types.
  rpc InternalBatchSuggest(ProductTypeBatchSuggestRequest) returns (ProductTypeBatchSuggestResponse) {}

  // Submit feedback for product type predictions.
  rpc Feedback(ProductTypeFeedbackRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/v2/models/product-types:feedback"
      body: "*"
    };
  }
}

message ProductTypeBatchSuggestRequest {
  // Text descriptions to classify into product types.
  repeated string texts = 1 [(validate.rules).repeated = {
    min_items: 1
    max_items: 1024
    items: {
      string: {min_len: 1}
    }
  }];
}

message ProductTypeBatchSuggestResponse {
  repeated ProductTypeSuggestion suggestions = 1;
}

message ProductTypeSuggestion {
  // Unique identifier for this suggestion, used to reference it in feedback.
  string id = 1;
  repeated ProductTypeCandidate candidates = 2;
}

message ProductTypeCandidate {
  ProductType type = 1;
  string label = 2;
  float confidence = 3;
  ConfidenceLevel confidence_level = 4;
}

enum ProductType {
  UNDEFINED = 0;
  ACCOUNTING_AUDIT = 1;
  ACCOUNTING_SOFTWARE = 2;
  ADVERTISING = 3;
  ALCOHOL_TOBACCO = 4;
  MEDICAL_LAB_EQUIPMENT = 5;
  BANKING_INVESTMENT = 6;
  BOOKS = 7;
  BUSINESS_CONSULTING = 8;
  CHEMICALS = 9;
  CLEANING_SERVICES = 10;
  CLEANING_SUPPLIES = 11;
  CLOTHING = 12;
  ELECTRONICS = 13;
  CONSTRUCTION_MATERIALS = 14;
  DECORATIONS_ART = 15;
  DEFENSE_SECURITY = 16;
  DEPOSITS = 17;
  DOMESTIC_APPLIANCES = 18;
  EDUCATION_TRAINING = 19;
  ENERGY = 20;
  FACILITY_MAINTENANCE = 21;
  AGRICULTURE = 22;
  FEES = 23;
  FINES = 24;
  FOOD_BEVERAGES = 25;
  FUEL_LUBRICANTS = 26;
  FURNITURE = 27;
  GIFTS = 28;
  GLASS_CERAMICS = 29;
  GOVERNMENT_SERVICES = 30;
  GRAPHIC_DESIGN = 31;
  FITNESS_CLUBS = 32;
  HEALTHCARE = 33;
  HOTELS = 34;
  INDUSTRIAL_MACHINERY = 35;
  MANUFACTURING = 36;
  INSURANCE = 37;
  INTERNET_MEDIA = 38;
  PROPERTY_RENTAL = 39;
  LEGAL = 40;
  PLANTS_ANIMALS = 41;
  MACHINERY_LEASING = 42;
  MARKETING = 43;
  MEETINGS = 44;
  MUSIC = 45;
  OFFICE_SUPPLIES = 46;
  PACKAGING = 47;
  PARKING = 48;
  PASSENGER_TRANSPORT = 49;
  PAYMENTS = 50;
  PAYROLL = 51;
  PERSONAL_SERVICES = 52;
  PERSONAL_CARE = 53;
  PHARMACEUTICALS = 54;
  MEDIA_SERVICES = 55;
  RECREATIONAL_SERVICES = 56;
  RESEARCH_TECH_CONSULTING = 57;
  RESTAURANTS = 58;
  RETIREMENT = 59;
  LOGISTICS = 60;
  SOFTWARE = 61;
  SPORTS_EQUIPMENT = 62;
  STORAGE = 63;
  TAXATION = 64;
  TELEPHONY = 65;
  TEXTILES = 66;
  JEWELRY = 67;
  TOLLS = 68;
  TOYS = 69;
  TRADE_REPAIR = 70;
  VEHICLE_RENTALS = 71;
  VEHICLES = 72;
  WATER_WASTE = 73;
  WEBSITE = 74;
}

message ProductTypeFeedbackRequest {
  string feedback_id = 1 [(validate.rules).string.min_len = 1];
  string feedback_category = 2 [(validate.rules).string.min_len = 1];
}

enum ConfidenceLevel {
  UNKNOWN = 0;
  VERY_LOW = 1;
  LOW = 2;
  MID = 3;
  HIGH = 4;
  VERY_HIGH = 5;
}
